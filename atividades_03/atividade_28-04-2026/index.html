<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Inscrição Evento Esportivo IFCE</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">
            <h2 class="text-center mb-4">Inscrição – Evento Esportivo IFCE</h2>

            <form>

                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" name="nome" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Matrícula</label>
                    <input type="text" class="form-control" name="matricula" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-control" name="email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Curso</label>
                    <input type="text" class="form-control" name="curso">
                </div>

                <div class="mb-3">
                    <label class="form-label">Campus</label>
                    <select class="form-select" name="campus">
                        <option>Iguatu</option>
                        <option>Fortaleza</option>
                        <option>Crato</option>
                        <option>Juazeiro</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Modalidade Esportiva</label>
                    <select class="form-select" name="modalidade">
                        <option>Futsal</option>
                        <option>Vôlei</option>
                        <option>Corrida</option>
                        <option>Xadrez</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Turno</label>
                    <select class="form-select" name="turno">
                        <option>Manhã</option>
                        <option>Tarde</option>
                        <option>Noite</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Sexo</label>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="sexo" value="masculino">
                        <label class="form-check-label">Masculino</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="sexo" value="feminino">
                        <label class="form-check-label">Feminino</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="sexo" value="outro">
                        <label class="form-check-label">Outro</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Data de Nascimento</label>
                    <input type="date" class="form-control" name="nascimento">
                </div>

                <div class="mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="tel" class="form-control" name="telefone">
                </div>

                <div class="mb-3">
                    <label class="form-label">Observações</label>
                    <textarea class="form-control" name="observacoes" rows="3"></textarea>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" required>
                    <label class="form-check-label">
                        Li e aceito o regulamento do evento
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Enviar Inscrição
                </button>

            </form>
        </div>

    </div>

</body>

</html>
