<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Botões Coloridos</title>
    <style>
        body {
            background-color: #f0f0f0;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .botao {
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .botao:hover {
            transform: scale(1.1);
        }

        .botao1 {
            background-color: #ff4444;
        }

        .botao2 {
            background-color: #44ff44;
            color: #333;
        }

        .botao3 {
            background-color: #4444ff;
        }

        .botao4 {
            background-color: #ffff44;
            color: #333;
        }

        .botao5 {
            background-color: #ff44ff;
        }

    </style>
</head>

<body>
    <div class="container">
        <button class="botao botao1">Botão 1</button>
        <button class="botao botao2">Botão 2</button>
        <button class="botao botao3">Botão 3</button>
        <button class="botao botao4">Botão 4</button>
        <button class="botao botao5">Botão 5</button>
    </div>
</body>

</html>
