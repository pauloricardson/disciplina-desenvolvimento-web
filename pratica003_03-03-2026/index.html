<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Inscrição Evento Esportivo IFCE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Inscrição – Evento Esportivo IFCE</h1>

        <form>

            <label>Nome Completo</label>
            <input type="text" name="nome" required>

            <label>Matrícula</label>
            <input type="text" name="matricula" required>

            <label>E-mail</label>
            <input type="email" name="email" required>

            <label>Curso</label>
            <input type="text" name="curso">

            <label>Campus</label>
            <select name="campus">
                <option>Iguatu</option>
                <option>Fortaleza</option>
                <option>Crato</option>
                <option>Juazeiro</option>
            </select>

            <label>Modalidade Esportiva</label>
            <select name="modalidade">
                <option>Futsal</option>
                <option>Vôlei</option>
                <option>Corrida</option>
                <option>Xadrez</option>
            </select>

            <label>Turno</label>
            <select name="turno">
                <option>Manhã</option>
                <option>Tarde</option>
                <option>Noite</option>
            </select>

            <label>Sexo</label>
            <div class="radio-group">
                <input type="radio" name="sexo"> Masculino
                <input type="radio" name="sexo"> Feminino
                <input type="radio" name="sexo"> Outro
            </div>

            <label>Data de Nascimento</label>
            <input type="date" name="nascimento">

            <label>Telefone</label>
            <input type="tel" name="telefone">

            <label>Observações</label>
            <textarea name="observacoes"></textarea>

            <div class="checkbox">
                <input type="checkbox" required>
                Li e aceito o regulamento do evento
            </div>

            <button type="submit">Enviar Inscrição</button>

        </form>

    </div>

</body>

</html>
